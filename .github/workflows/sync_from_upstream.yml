name: Sync from Upstream LLVM

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  Fetch-Upstream:
    runs-on: ubuntu-latest
    if: github.repository == 'sriyalamar/cpullvm-toolchain'

    strategy:
      matrix:
        branch: [main]

    env:
      UPSTREAM_REMOTE: https://github.com/llvm/llvm-project.git

    steps:
      - name: Checkout downstream repo
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 0   # REQUIRED

      - name: Configure upstream remote
        run: |
          git remote add upstream $UPSTREAM_REMOTE
          git remote -v

      - name: Fetch upstream
        run: git fetch upstream

      - name: Show divergence with upstream
        run: |
          echo "Commits only in upstream (<) vs downstream (>):"
          git log --oneline --left-right --cherry upstream/${{ matrix.branch }}...HEAD

      - name: Configure git identity
        run: |
          git config --local user.name "Sri Lakshmi"
          git config --local user.email "syalamar@qti.qualcomm.com"

      - name: Fast-forward merge upstream
        run: |
          git merge --ff-only upstream/${{ matrix.branch }}

      - name: Push changes if any
        run: git push origin ${{ matrix.branch }}
